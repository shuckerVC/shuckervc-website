<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--gold-400); border-radius: 3px; width: 100%; }
  .b { width: 24px; }
  .lbl { font-size: 10px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar b" style="height:4px"></div><span class="lbl">1·4</span></div>
    <div class="item"><div class="bar b" style="height:8px"></div><span class="lbl">2·8</span></div>
    <div class="item"><div class="bar b" style="height:12px"></div><span class="lbl">3·12</span></div>
    <div class="item"><div class="bar b" style="height:16px"></div><span class="lbl">4·16</span></div>
    <div class="item"><div class="bar b" style="height:24px"></div><span class="lbl">5·24</span></div>
    <div class="item"><div class="bar b" style="height:32px"></div><span class="lbl">6·32</span></div>
    <div class="item"><div class="bar b" style="height:40px"></div><span class="lbl">7·40</span></div>
    <div class="item"><div class="bar b" style="height:48px"></div><span class="lbl">8·48</span></div>
    <div class="item"><div class="bar b" style="height:64px"></div><span class="lbl">10·64</span></div>
  </div>
</body>
</html>
