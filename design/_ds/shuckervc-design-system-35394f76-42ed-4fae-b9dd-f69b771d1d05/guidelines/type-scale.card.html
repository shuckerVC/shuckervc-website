<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="Display sizes paired with their role" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-page); color: var(--text-primary); }
  .r { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border); padding: 7px 0; }
  .meta { width: 96px; font-family: var(--font-sans); font-size: 10px; color: var(--text-secondary); flex: none; }
  .ex { font-family: var(--font-display); line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="meta">3xl · 48px</span><span class="ex" style="font-size:48px">Founder Focus</span></div>
  <div class="r"><span class="meta">2xl · 36px</span><span class="ex" style="font-size:36px">Real Value Delivered</span></div>
  <div class="r"><span class="meta">xl · 28px</span><span class="ex" style="font-size:28px">Backing top technical founders</span></div>
  <div class="r"><span class="meta">lg · 22px</span><span class="ex" style="font-size:22px">Founders focus, shuckerVC does the rest</span></div>
  <div class="r"><span class="meta">base · 16px</span><span class="ex" style="font-family:var(--font-sans);font-size:16px">Body copy is set in Lato for clarity.</span></div>
</body>
</html>
