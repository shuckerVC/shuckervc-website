<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Warm Neutrals" subtitle="Near-black ink through warm off-whites" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 7px 8px; }
  .name { font-size: 11px; font-weight: 600; color: var(--text-primary); }
  .hex { font-size: 10px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">ink-900</div><div class="hex">#111111</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">ink-700</div><div class="hex">#2a2a2a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="meta"><div class="name">gray-500</div><div class="hex">#6f6a61</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-300)"></div><div class="meta"><div class="name">gray-300</div><div class="hex">#c4bdb1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="meta"><div class="name">gray-200</div><div class="hex">#e6e2d9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><div class="meta"><div class="name">gray-100</div><div class="hex">#f4f1ea</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-50)"></div><div class="meta"><div class="name">gray-50</div><div class="hex">#faf8f2</div></div></div>
  </div>
</body>
</html>
