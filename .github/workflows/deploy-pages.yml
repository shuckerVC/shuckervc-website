name: Deploy to GitHub Pages

# Publishes the static site in site/ to GitHub Pages on every push to main
# (including the hourly Notion sync commits) and on manual dispatch.
on:
  push:
    branches: [main]
  # The Notion sync dispatches this workflow directly when it actually commits a
  # change (its GITHUB_TOKEN push can't fire the push event above), so we only
  # deploy on real content changes — not on every hourly sync run.
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://shuckervc.github.io/shuckervc-website/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      # GitHub Pages' backend intermittently fails a created deployment with
      # "Deployment failed, try again later" — retry with backoff so a transient
      # failure doesn't fail the whole run.
      - name: Deploy (attempt 1)
        id: dep1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Backoff before retry
        if: steps.dep1.outcome == 'failure'
        run: sleep 60
      - name: Deploy (attempt 2)
        id: dep2
        if: steps.dep1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Backoff before final retry
        if: steps.dep1.outcome == 'failure' && steps.dep2.outcome == 'failure'
        run: sleep 150
      - name: Deploy (final attempt)
        if: steps.dep1.outcome == 'failure' && steps.dep2.outcome == 'failure'
        uses: actions/deploy-pages@v4
