<!-- @dsCard group="Colors" viewport="700x150" name="Brand Gold" subtitle="Bright-Sun gold scale — the signature shuckerVC color" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .hex { font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .star { color: var(--gold-600); font-size: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gold-100)"></div><div class="meta"><div class="name">gold-100</div><div class="hex">#fff6da</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-200)"></div><div class="meta"><div class="name">gold-200</div><div class="hex">#ffeab0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-300)"></div><div class="meta"><div class="name">gold-300</div><div class="hex">#ffda6f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-400)"></div><div class="meta"><div class="name">gold-400 <span class="star">★ primary</span></div><div class="hex">#ffcd3c</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"></div><div class="meta"><div class="name">gold-500</div><div class="hex">#ffc009</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><div class="meta"><div class="name">gold-600</div><div class="hex">#d99e00</div></div></div>
  </div>
</body>
</html>
