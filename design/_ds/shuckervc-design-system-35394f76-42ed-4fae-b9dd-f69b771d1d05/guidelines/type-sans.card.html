<!-- @dsCard group="Type" viewport="700x190" name="Sans — Lato" subtitle="Humanist sans for UI, body & secondary headers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-sans); color: var(--text-primary); }
  .r { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; }
  .w { width: 70px; font-size: 11px; color: var(--text-secondary); }
  .s { font-size: 21px; white-space: nowrap; }
</style>
</head>
<body>
  <div class="r"><span class="w">Light 300</span><span class="s" style="font-weight:300">Backing top technical founders</span></div>
  <div class="r"><span class="w">Regular 400</span><span class="s" style="font-weight:400">Backing top technical founders</span></div>
  <div class="r"><span class="w">Bold 700</span><span class="s" style="font-weight:700">Backing top technical founders</span></div>
  <div class="r"><span class="w">Black 900</span><span class="s" style="font-weight:900">Backing top technical founders</span></div>
</body>
</html>
