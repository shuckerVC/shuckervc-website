<!-- @dsCard group="Colors" viewport="700x150" name="Secondary Accents" subtitle="Teal, stone & bark — use sparingly alongside gold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .hex { font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--teal-400)"></div><div class="meta"><div class="name">teal-400</div><div class="hex">#00eed1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-600)"></div><div class="meta"><div class="name">teal-600 · accent</div><div class="hex">#00b49b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-300)"></div><div class="meta"><div class="name">sand-300</div><div class="hex">#b5aa99</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bark-700)"></div><div class="meta"><div class="name">bark-700</div><div class="hex">#4e4637</div></div></div>
  </div>
</body>
</html>
