<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Warm-tinted elevation + the gold glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 24px; background: var(--surface-muted); font-family: var(--font-sans); }
  .row { display: flex; gap: 22px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 96px; height: 60px; background: var(--white); border-radius: var(--radius-md); }
  .lbl { font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-gold)"></div><span class="lbl">gold glow</span></div>
  </div>
</body>
</html>
