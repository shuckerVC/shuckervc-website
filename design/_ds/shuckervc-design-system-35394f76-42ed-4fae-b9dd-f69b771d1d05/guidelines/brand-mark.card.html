<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); display: flex; height: 100vh; }
  .cell { flex: 1; display: flex; align-items: center; justify-content: center; }
  .cell img { height: 92px; width: auto; }
  .light { background: var(--surface-page); }
  .muted { background: var(--gray-100); }
  .dark { background: var(--ink-900); }
</style>
</head>
<body>
  <div class="cell light"><img src="../assets/logo/mark-gold.png" alt="gold mark"></div>
  <div class="cell muted"><img src="../assets/logo/mark-black.png" alt="black mark"></div>
  <div class="cell dark"><img src="../assets/logo/mark-white.png" alt="white mark"></div>
</body>
</html>
