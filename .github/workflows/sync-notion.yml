name: Sync Insights from Notion

# Keeps site/insights.json in sync with the Notion 🥁 shuckerVC Blog.
# Runs hourly, on manual dispatch, and on pushes that touch the sync inputs.
on:
  schedule:
    - cron: '17 * * * *'   # hourly at :17
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/sync-notion.mjs'
      - 'scripts/essays.json'

permissions:
  contents: write
  actions: write   # to dispatch the deploy workflow on a real change

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Sync from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-notion.mjs
      - name: Commit + deploy only if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "shuckerVC bot"
          git config user.email "bot@shucker.vc"
          git add site/insights.json site/assets/insights
          if git diff --cached --quiet; then
            echo "No changes — skipping commit and deploy."
          else
            git commit -m "chore: sync insights from Notion"
            git push
            gh workflow run "Deploy to GitHub Pages" --repo "$GITHUB_REPOSITORY"
          fi
